<script>
  firebase.initializeApp({
    apiKey:            "AIzaSyDq5ew_s9QpgDPBF_ZA0Ksr2ge3m6TtRjA",
    authDomain:        "autobank-dba16.firebaseapp.com",
    databaseURL:       "https://autobank-dba16-default-rtdb.firebaseio.com",
    projectId:         "autobank-dba16",
    storageBucket:     "autobank-dba16.firebasestorage.app",
    messagingSenderId: "1072197275549",
    appId:             "1:1072197275549:web:617068339935d992106974"
  });
  const _auth = firebase.auth();
  const _db   = firebase.database();

  const PRICE_OKVIP = 5000;
  const PRICE_SV2   = 3000;
  let _uid = null, _balance = 0;

  _auth.onAuthStateChanged(user => {
    if (user) {
      _uid = user.uid;
      _db.ref(`users/${_uid}/balance`).on("value", snap => {
        _balance = snap.val() || 0;
        document.getElementById("balanceBox").textContent = "💰 " + formatVND(_balance);
      });
      document.getElementById("balanceBox").style.display = "inline-block";
      document.getElementById("loginPrompt").style.display = "none";
      document.getElementById("userBar").classList.add("show");
      document.getElementById("userNameBar").textContent = "👤 " + (user.displayName || user.email);
    } else {
      _uid = null; _balance = 0;
      document.getElementById("balanceBox").style.display = "none";
      document.getElementById("loginPrompt").style.display = "inline-block";
      document.getElementById("userBar").classList.remove("show");
    }
  });

  function formatVND(n) { return (n||0).toLocaleString("vi-VN") + " ₫"; }

  async function deductBalance(amount, simId, phone, type) {
    if (!_uid) return;
    // Dùng transaction để atomic — tránh race condition
    const balRef = _db.ref(`users/${_uid}/balance`);
    let success  = false;
    await balRef.transaction(current => {
      const bal = current || 0;
      if (bal < amount) return; // abort transaction
      success = true;
      return bal - amount;
    });
    if (!success) throw new Error(`Số dư không đủ! Cần ${formatVND(amount)}, có ${formatVND(_balance)}`);
    await _db.ref(`transactions/${_uid}/SMS_${Date.now()}`).set({
      type, amount: -amount, simId, phone, createdAt: Date.now()
    });
  }

  async function refundBalance(amount, simId, phone) {
    if (!_uid) return;
    // Dùng transaction để atomic — tránh cộng sai
    await _db.ref(`users/${_uid}/balance`).transaction(current => (current || 0) + amount);
    await _db.ref(`transactions/${_uid}/REFUND_${Date.now()}`).set({
      type: "Hoàn tiền SIM", amount, simId, phone, createdAt: Date.now()
    });
  }
</script>

<script>
/* ===== CHỐNG INSPECT ===== */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", e => {
  if (e.key === "F12") e.preventDefault();
  if (e.ctrlKey && e.key.toLowerCase() === "u") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(e.key.toLowerCase())) e.preventDefault();
  if (e.ctrlKey && ["s","p"].includes(e.key.toLowerCase())) e.preventDefault();
});

/* ===== CONFIG ===== */
const WORKER           = "https://api.dblgamingg.workers.dev";
const SV2_BASE         = "https://noisy-darkness-b3aa.dblgamingg.workers.dev/api";
const OKVIP_KEY        = "eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiJ0dWFuMjQiLCJqdGkiOiI4Njk2NCIsImlhdCI6MTc2OTgzNjg2OCwiZXhwIjoxODMyMDQ0ODY4fQ.qP0nIoD-GzWxH_Wz4dNLDNqoGFTpny-jZkgKEZMpFDDIRjK3lQwt0mRF0zUPo3r856n5KxRZAHoRXjPXT3a16Q";
const SV2_KEY          = "edf7f0bfd68cba376074d7e7f3234a13";
const FIXED_SERVICE_ID = 49;

let currentServer = "okvip";

function selectServer(server) {
  currentServer = server;
  document.getElementById("tabOkvip").className = "server-tab okvip" + (server==="okvip"?" active":"");
  document.getElementById("tabSv2").className   = "server-tab sv2"   + (server==="sv2"  ?" active":"");
  document.getElementById("priceLock").innerHTML = server === "okvip"
    ? '🔒 <b>Thuê sms:</b> Okvip – <b>5K</b>'
    : '🔒 <b>Thuê sms:</b> Sv ADmin (Okvip) – <b>3.0K</b>';
  if (server === "okvip") loadNetworksOkvip();
  else                    loadNetworksSv2();
}

/* ===== STORAGE ===== */
const SIM_KEY = "okvip_sims";
let sims = [], otpTimer = null;

const log = (t) => document.getElementById("log").textContent =
  typeof t === "object" ? JSON.stringify(t, null, 2) : t;

/* ===== HTTP ===== */
async function callOkvip(path) {
  const res = await fetch(WORKER + path);
  return res.json();
}
async function callSv2(params) {
  const url = SV2_BASE + "?" + new URLSearchParams({ apik: SV2_KEY, ...params });
  const res = await fetch(url);
  return res.json();
}

/* ===== COPY ===== */
function copyText(btn, text, stripLeadingZero = false) {
  if (!text) return;
  let v = (stripLeadingZero && text.startsWith("0")) ? text.slice(1) : text;
  const finish = (ok) => {
    const old = btn.textContent;
    btn.textContent = ok ? "✅" : "❌";
    setTimeout(() => btn.textContent = old, 1400);
  };
  if (navigator.clipboard && window.isSecureContext)
    navigator.clipboard.writeText(v).then(() => finish(true)).catch(() => fallbackCopy(v, finish));
  else fallbackCopy(v, finish);
}
function fallbackCopy(text, finish) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    finish(document.execCommand("copy")); document.body.removeChild(ta);
  } catch(e) { finish(false); }
}

/* ===== PERSIST ===== */
function saveSims() { localStorage.setItem(SIM_KEY, JSON.stringify(sims)); }
function loadSims() {
  const raw = localStorage.getItem(SIM_KEY);
  if (!raw) return;
  sims = JSON.parse(raw);
  // Migration: SIM cũ không có pricePaid → set 0 tránh hoàn nhầm
  sims.forEach(s => { if (s.pricePaid === undefined) s.pricePaid = 0; });
  if (sims.length) { renderSims(); startOtp(); }
}

/* ===== NETWORKS ===== */
async function loadNetworksOkvip() {
  const d = await callOkvip(`/networks?api_key=${OKVIP_KEY}`);
  const n = document.getElementById("network");
  n.innerHTML = '<option value="">-- Tất cả nhà mạng --</option>';
  d?.data?.forEach(x => { n.innerHTML += `<option value="${x.id}">${x.name}</option>`; });
}
function loadNetworksSv2() {
  document.getElementById("network").innerHTML = `
    <option value="">-- Tất cả nhà mạng --</option>
    <option value="Viettel">Viettel</option>
    <option value="Mobi">Mobifone</option>
    <option value="Vina">Vinaphone</option>
    <option value="VNMB">Vietnamobile</option>
    <option value="ITelecom">ITelecom</option>
  `;
}

/* ===== GET SIM ===== */
async function getSim() {
  const btn = document.querySelector("button[onclick='getSim()']");
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = "⏳ Đang lấy số...";
  const network = document.getElementById("network").value;
  const prefix  = document.getElementById("prefix").value.trim();
  try {
    if (currentServer === "okvip") await getSimOkvip(network, prefix);
    else                           await getSimSv2(network, prefix);
  } finally {
    btn.disabled = false;
    btn.textContent = "📞 Lấy số";
  }
}

async function getSimOkvip(network, prefix) {
  if (_uid) {
    try { await deductBalance(PRICE_OKVIP, "pending", "", "Thuê SIM OKVIP"); }
    catch (e) { return alert("❌ " + e.message); }
  }
  let q = `/get-sim?api_key=${OKVIP_KEY}&service_id=${FIXED_SERVICE_ID}`;
  if (network) q += `&network_id=${network}`;
  if (prefix)  q += `&phone=${prefix}`;
  const d = await callOkvip(q);
  if (d?.status !== 200) {
    if (_uid) await refundBalance(PRICE_OKVIP, "failed", "");
    return log("❌ OKVIP: Không lấy được số\n" + JSON.stringify(d));
  }
  sims.push({ source:"okvip", otpId:d.data.otpId, simId:d.data.simId, phone:d.data.phone, code:null, audio:null, done:false, pricePaid: _uid ? PRICE_OKVIP : 0 });
  saveSims(); renderSims(); startOtp();
  log("✅ Đã lấy số" + (_uid ? `, trừ ${formatVND(PRICE_OKVIP)}` : ""));
}

async function getSimSv2(network, prefix) {
  if (_uid) {
    try { await deductBalance(PRICE_SV2, "pending", "", "Thuê SIM Sv2"); }
    catch (e) { return alert("❌ " + e.message); }
  }
  const params = { act:"number", appId:1200 };
  if (network) params.carrier = network;
  if (prefix)  params.prefix  = prefix;
  const d = await callSv2(params);
  if (d?.ResponseCode !== 0) {
    if (_uid) await refundBalance(PRICE_SV2, "failed", "");
    if (d?.ResponseCode === 3) d.Msg = "Kho số tạm hết, thử lại sau";
    return log("❌ Sv2: Không lấy được số\n" + JSON.stringify(d));
  }
  sims.push({ source:"sv2", otpId:d.Result.Id, simId:d.Result.Id, phone:"0"+d.Result.Number, code:null, audio:null, done:false, pricePaid: _uid ? PRICE_SV2 : 0 });
  saveSims(); renderSims(); startOtp();
  log("✅ Đã lấy số" + (_uid ? `, trừ ${formatVND(PRICE_SV2)}` : ""));
}

/* ===== RENDER ===== */
function renderSims() {
  const box = document.getElementById("simList");
  box.innerHTML = "";
  sims.forEach((s, i) => {
    const badgeHtml = s.source==="okvip"
      ? '<span class="badge badge-okvip">OKVIP</span>'
      : '<span class="badge badge-sv2">Sv2</span>';
    const div       = document.createElement("div");
    div.className   = "sim";
    const otpHtml   = s.code  ? `<span class="done">${s.code}</span> <button class="copy-btn" data-copy="${s.code}">📋</button>` : "Đang chờ...";
    const smsHtml   = s.sms   ? `<br>📩 <small>${s.sms}</small>` : "";
    const audioHtml = s.audio ? `<div>🎧 OTP GỌI:<audio controls preload="none"><source src="${s.audio}" type="audio/mpeg"></audio></div>` : "";
    div.innerHTML = `
      <b>📞 ${s.phone}</b>
      <button class="copy-btn" data-copy="${s.phone}" data-strip="1">📋</button>
      ${badgeHtml}<br>
      🆔 ID: ${s.otpId}<br>
      🔐 OTP: ${otpHtml}
      ${smsHtml}${audioHtml}
      <button data-cancel="${i}">❌ Hủy SIM</button>
    `;
    box.appendChild(div);
  });
  box.onclick = (e) => {
    const btn = e.target.closest("button[data-copy], button[data-cancel]");
    if (!btn) return;
    if (btn.dataset.cancel !== undefined) cancelSim(Number(btn.dataset.cancel));
    else if (btn.dataset.copy !== undefined) copyText(btn, btn.dataset.copy, btn.dataset.strip==="1");
  };
}

/* ===== OTP POLLING ===== */
function startOtp() {
  if (otpTimer) return;
  otpTimer = setInterval(pollOtp, 4000);
}
async function pollOtp() {
  let changed = false;
  for (const s of sims) {
    if (s.done) continue;
    if (s.source === "okvip") {
      const d = await callOkvip(`/get-otp?api_key=${OKVIP_KEY}&otp_id=${s.otpId}`);
      if (!d?.data) continue;
      const content = d.data.content||"", audio = d.data.audio||"";
      const match   = content.match(/\b\d{4,8}\b/);
      if (match)       { s.code=match[0]; s.sms=content; s.done=true; changed=true; }
      else if (audio)  { s.audio=audio; s.done=true; changed=true; }
    } else {
      const d = await callSv2({ act:"code", id:s.otpId });
      if (!d) continue;
      if (d.ResponseCode===0 && d.Result) {
        s.sms=d.Result.SMS||""; s.code=d.Result.Code||"";
        if (d.Result.IsCall && d.Result.CallFile) s.audio=d.Result.CallFile;
        s.done=true; changed=true;
      } else if (d.ResponseCode===2) { s.done=true; s.code="⏰ Hết giờ"; changed=true; }
    }
  }
  if (changed) { saveSims(); renderSims(); }
}

/* ===== CANCEL ===== */
async function cancelSim(index) {
  const s   = sims[index];
  if (s._cancelling) return; // tránh bấm 2 lần
  s._cancelling = true;
  saveSims();

  try {
    if (s.source==="okvip") await callOkvip(`/cancel?api_key=${OKVIP_KEY}&sim_id=${s.simId}`);
    else                    await callSv2({ act:"expired", id:s.otpId });
  } catch {}

  // Hoàn tiền nếu chưa hoàn và có pricePaid hợp lệ
  if (_uid && s.pricePaid > 0 && !s.refunded) {
    s.refunded = true;
    await refundBalance(s.pricePaid, s.simId, s.phone);
    log("✅ Đã hủy SIM, hoàn " + formatVND(s.pricePaid));
  } else {
    log("✅ Đã hủy SIM");
  }

  sims.splice(index, 1);
  saveSims(); renderSims();
  if (!sims.length) { clearInterval(otpTimer); otpTimer=null; localStorage.removeItem(SIM_KEY); }
}

/* ===== AUTH MODAL ===== */
function openAuthModal()  { document.getElementById("authModal").classList.add("open"); }
function closeAuthModal() { document.getElementById("authModal").classList.remove("open"); }

document.getElementById("authModal").addEventListener("click", e => {
  if (e.target === document.getElementById("authModal")) closeAuthModal();
});

function switchAuthTab(tab) {
  document.getElementById("formLogin").style.display    = tab==="login"    ? "block" : "none";
  document.getElementById("formRegister").style.display = tab==="register" ? "block" : "none";
  document.getElementById("tab1").className = "auth-tab" + (tab==="login"    ? " active" : "");
  document.getElementById("tab2").className = "auth-tab" + (tab==="register" ? " active" : "");
  document.getElementById("authTitle").textContent = tab==="login" ? "Đăng nhập" : "Tạo tài khoản";
  document.getElementById("loginErr").classList.remove("show");
  document.getElementById("regErr").classList.remove("show");
}

async function doLogin() {
  const btn   = document.getElementById("loginBtn");
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPass").value;
  const err   = document.getElementById("loginErr");
  err.classList.remove("show");
  if(!email||!pass) { err.textContent="Vui lòng điền đầy đủ"; err.classList.add("show"); return; }
  btn.disabled=true; btn.textContent="⏳ Đang xử lý...";
  try {
    await _auth.signInWithEmailAndPassword(email, pass);
    closeAuthModal();
  } catch(e) {
    err.textContent = authErr(e.code);
    err.classList.add("show");
  }
  btn.disabled=false; btn.textContent="🔐 ĐĂNG NHẬP";
}

async function doRegister() {
  const btn     = document.getElementById("registerBtn");
  const name    = document.getElementById("regName").value.trim();
  const email   = document.getElementById("regEmail").value.trim();
  const pass    = document.getElementById("regPass").value;
  const confirm = document.getElementById("regConfirm").value;
  const err     = document.getElementById("regErr");
  err.classList.remove("show");
  if(!name||!email||!pass||!confirm) { err.textContent="Vui lòng điền đầy đủ"; err.classList.add("show"); return; }
  if(pass!==confirm) { err.textContent="Mật khẩu không khớp"; err.classList.add("show"); return; }
  if(pass.length<6)  { err.textContent="Mật khẩu tối thiểu 6 ký tự"; err.classList.add("show"); return; }
  btn.disabled=true; btn.textContent="⏳ Đang tạo...";
  try {
    const cred = await _auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    await _db.ref(`users/${cred.user.uid}`).set({ displayName:name, email, balance:0, createdAt:Date.now() });
    closeAuthModal();
  } catch(e) {
    err.textContent = authErr(e.code);
    err.classList.add("show");
  }
  btn.disabled=false; btn.textContent="✅ TẠO TÀI KHOẢN";
}

async function doLogout() {
  await _auth.signOut();
}

function authErr(code) {
  const m = {
    "auth/user-not-found":       "Email không tồn tại",
    "auth/wrong-password":       "Sai mật khẩu",
    "auth/invalid-credential":   "Email hoặc mật khẩu không đúng",
    "auth/email-already-in-use": "Email đã được sử dụng",
    "auth/invalid-email":        "Email không hợp lệ",
    "auth/weak-password":        "Mật khẩu quá yếu",
    "auth/too-many-requests":    "Thử lại sau",
  };
  return m[code] || ("Lỗi: " + code);
}

window.onload = () => {
  loadNetworksOkvip();
  loadSims();
};
