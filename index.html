<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROXY XOAY EAGLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --surface: #f5f5f8;
    --card: #fafafa;
    --card2: #f0f0f5;
    --border: #e2e2ec;
    --border2: #d0d0de;
    --text: #1a1a2e;
    --muted: #9090a8;
    --muted2: #6a6a88;
    --accent: #5254cc;
    --accent2: #4446b8;
    --orange: #f97316;
    --green: #16a34a;
    --red: #dc2626;
    --blue: #2563eb;
    --purple: #7c3aed;
    --cyan: #0891b2;
    --glow: rgba(82,84,204,.12);
    --glow-sm: rgba(82,84,204,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
}

#matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(82,84,204,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82,84,204,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 1;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.45) 60%, rgba(255,255,255,0.25) 100%);
    pointer-events: none;
    z-index: 2;
}

.page-wrap {
    position: relative;
    z-index: 10;
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 16px 60px;
}

.sms-okvip-btn {
    position: fixed;
    top: 18px; right: 18px;
    background: linear-gradient(135deg, #f59e0b, #f97316);
    color: #fff;
    padding: 9px 16px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
    border-radius: 6px;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(249,115,22,.25), 0 2px 8px rgba(0,0,0,.12);
    z-index: 999;
    transition: all .2s;
    text-transform: uppercase;
}
.sms-okvip-btn:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(249,115,22,.4), 0 4px 12px rgba(0,0,0,.15); }

/* ── Header ── */
.header { text-align: center; margin-bottom: 32px; padding-top: 12px; }
.header-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    background: rgba(82,84,204,.07);
    border: 1px solid rgba(82,84,204,.18);
    padding: 3px 10px;
    border-radius: 3px;
}
.header h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, #1a1a2e 0%, var(--accent) 50%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
}
.header-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 8px;
}
.header-line {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 14px auto 0;
}

/* ── Panel ── */
.panel {
    background: rgba(250,250,250,0.88);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: visible;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}
.panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
    opacity: .4;
    border-radius: 10px 10px 0 0;
    pointer-events: none;
}
.panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.panel-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(82,84,204,.5);
}

/* ── Textarea / Input ── */
textarea, input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    transition: border-color .2s, box-shadow .2s;
    line-height: 1.6;
}
textarea { resize: vertical; min-height: 88px; }
textarea::placeholder, input::placeholder { color: var(--muted); }
textarea:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow-sm);
}

/* ── Buttons ── */
.btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
    align-items: center;
}
button {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    color: #fff;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
}
button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
button:active:not(:disabled) { transform: translateY(0); filter: brightness(.96); }
button:disabled { opacity: .4; cursor: not-allowed; }

.btn-add { background: #ffffff; border: 1.5px solid var(--border2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.btn-add:hover:not(:disabled) { border-color: var(--accent); box-shadow: 0 0 12px var(--glow-sm); color: var(--accent); }
.btn-rotate { background: linear-gradient(135deg, var(--accent), #4f46e5); box-shadow: 0 2px 10px rgba(82,84,204,.25); }
.btn-copy { background: linear-gradient(135deg, #15803d, #16a34a); box-shadow: 0 2px 8px rgba(22,163,74,.18); }
.btn-delete { background: linear-gradient(135deg, #b91c1c, #dc2626); box-shadow: 0 2px 8px rgba(220,38,38,.18); }
.btn-red { background: linear-gradient(135deg, #b91c1c, #dc2626); box-shadow: 0 2px 8px rgba(220,38,38,.18); }
.btn-orange { background: linear-gradient(135deg, #c2410c, #ea580c); box-shadow: 0 2px 10px rgba(234,88,12,.2); }
.btn-blue { background: linear-gradient(135deg, #1d4ed8, #2563eb); box-shadow: 0 2px 8px rgba(37,99,235,.2); }
.btn-purple { background: linear-gradient(135deg, #6d28d9, #7c3aed); box-shadow: 0 2px 8px rgba(124,58,237,.2); }
.btn-cyan { background: linear-gradient(135deg, #0e7490, #0891b2); box-shadow: 0 2px 8px rgba(8,145,178,.2); }
.btn-primary { background: linear-gradient(135deg, var(--accent), #4f46e5); box-shadow: 0 2px 10px rgba(82,84,204,.25); }
.btn-teal { background: linear-gradient(135deg, #0f766e, #0d9488); box-shadow: 0 2px 8px rgba(13,148,136,.2); }
.btn-full { width: 100%; justify-content: center; }

#apiStatus {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    margin-top: 10px;
    padding: 6px 10px;
    background: var(--surface);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
    display: none;
}
#apiStatus.visible { display: block; }

/* ── Copy All Dropdown ── */
.copy-all-wrapper { position: relative; display: inline-block; }
.copy-all-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: #ffffff;
    border: 1px solid var(--border2);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
    z-index: 200;
    min-width: 200px;
    overflow: hidden;
}
.copy-all-dropdown.open { display: block; animation: dropIn .12s ease; }
@keyframes dropIn { from { opacity:0; transform: translateY(-4px) scale(.98); } to { opacity:1; transform:none; } }
.copy-all-dropdown button {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 11px 14px; font-size: 12px;
    border-radius: 0; background: transparent; color: var(--text);
    text-align: left; border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.5px;
    transform: none; box-shadow: none;
}
.copy-all-dropdown button:last-child { border-bottom: none; }
.copy-all-dropdown button:hover { background: rgba(82,84,204,.06); transform: none; filter: none; }
.copy-all-dropdown button .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-http   { background: var(--blue); }
.dot-socks5 { background: var(--purple); }
.dot-all    { background: conic-gradient(var(--blue) 0% 50%, var(--purple) 50% 100%); }

/* ── Proxy List ── */
#proxyList { display: flex; flex-direction: column; gap: 12px; }

/* ── Proxy Card ── */
.proxy-container {
    background: rgba(250,250,250,0.88);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
    animation: cardIn .25s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}
@keyframes cardIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
.proxy-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(82,84,204,.2), transparent);
}
.proxy-container:hover { border-color: var(--border2); box-shadow: 0 4px 18px rgba(0,0,0,.08); }
.proxy-container.uuid-type { border-left: 2px solid var(--purple); }
.proxy-container.uuid-type::before { background: linear-gradient(90deg, transparent, rgba(124,58,237,.2), transparent); }

/* Fproxy card — teal accent */
.proxy-container.fproxy-type { border-left: 2px solid #0d9488; }
.proxy-container.fproxy-type::before { background: linear-gradient(90deg, transparent, rgba(13,148,136,.25), transparent); }

/* ── Proxy Text ── */
.proxy-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    word-break: break-all;
    overflow-wrap: anywhere;
    user-select: text;
    color: var(--accent2);
    line-height: 1.6;
    flex: 1;
    overflow-x: auto;
}
.proxy-text.uuid-proxies { display: flex; flex-direction: column; gap: 8px; background: transparent; border: none; padding: 0; }

/* ── Proxy lines ── */
.proxy-line {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    position: relative;
}
.proxy-line:hover { background: rgba(82,84,204,.06); border-color: var(--accent); }
.proxy-line:hover::after {
    content: '⎘ COPY';
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent); background: rgba(82,84,204,.1); border: 1px solid rgba(82,84,204,.25); border-radius: 3px; padding: 2px 7px; pointer-events: none;
}
.proxy-line.copied { background: rgba(22,163,74,.08) !important; border-color: var(--green) !important; }
.proxy-line.copied::after { content: '✅ COPIED' !important; color: var(--green) !important; background: rgba(22,163,74,.1) !important; border-color: rgba(22,163,74,.3) !important; }

/* Fproxy lines — teal hover */
.fproxy-proxy-line {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    position: relative;
}
.fproxy-proxy-line:hover { background: rgba(13,148,136,.06); border-color: #0d9488; }
.fproxy-proxy-line:hover::after {
    content: '⎘ COPY';
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: #0f766e; background: rgba(13,148,136,.1); border: 1px solid rgba(13,148,136,.25); border-radius: 3px; padding: 2px 7px; pointer-events: none;
}
.fproxy-proxy-line.copied { background: rgba(22,163,74,.08) !important; border-color: var(--green) !important; }
.fproxy-proxy-line.copied::after { content: '✅ COPIED' !important; color: var(--green) !important; background: rgba(22,163,74,.1) !important; border-color: rgba(22,163,74,.3) !important; }

.proxy-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 2px 8px;
    border-radius: 3px;
    color: #fff;
    white-space: nowrap;
    text-transform: uppercase;
}
.proxy-label.http   { background: var(--blue); }
.proxy-label.socks5 { background: var(--purple); }

.proxy-sublabel {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
}

.proxy-value { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text); word-break: break-all; overflow-wrap: anywhere; flex: 1; min-width: 0; }

/* ── Status ── */
.status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    padding: 4px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: nowrap;
    width: 100%;
    text-align: center;
}
@media (min-width: 540px) { .status { width: auto; text-align: left; align-self: center; } }

/* ── Proxy actions wrapper ── */
.proxy-actions { display: flex; flex-direction: column; gap: 7px; width: 100%; }
.filter-row { display: flex; gap: 6px; align-items: center; width: 100%; }
.filter-row input { background: var(--surface); border: 1.5px solid var(--border2); border-radius: 6px; padding: 7px 10px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); flex: 1; min-width: 0; transition: border-color .2s; width: auto; }
.filter-row input::placeholder { color: var(--muted); }
.filter-row input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(8,145,178,.1); }
.action-btns { display: flex; gap: 6px; flex-wrap: nowrap; width: 100%; }
.action-btns button { flex: 1 1 0; min-width: 0; font-size: 11px; padding: 8px 4px; overflow: hidden; text-overflow: ellipsis; justify-content: center; }

@media (min-width: 540px) {
    .proxy-actions { flex-direction: row; align-items: center; }
    .filter-row { flex: 1.6 1 0; width: auto; }
    .action-btns { flex: 3 1 0; width: auto; }
}

/* ── IP row ── */
.ip-info-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 0 2px; flex-wrap: wrap; }
.real-ip-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.real-ip-label::before { content: '◉'; font-size: 9px; color: var(--green); }

.btn-test-km {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    background: rgba(217,119,6,.08); border: 1px solid rgba(217,119,6,.3); color: #b45309;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; transition: all .15s; text-transform: uppercase;
}
.btn-test-km:hover:not(:disabled) { background: rgba(217,119,6,.15); border-color: #d97706; transform: none; filter: none; }

/* Badge + IP row: badges trái, IP + TEST KM phải */
.fproxy-badge-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
}
.fproxy-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 2px 8px; border-radius: 3px;
    color: #fff; text-transform: uppercase;
}
.fproxy-badge.loc  { background: linear-gradient(135deg, #0e7490, #0891b2); }
.fproxy-badge.wait { background: linear-gradient(135deg, #c2410c, #ea580c); }
.fproxy-badge.die  { background: linear-gradient(135deg, #7c3aed, #6d28d9); }

.proxy-divider { height: 1px; background: var(--border); margin: 2px 0; }

/* Domain copy button — inline on each proxy row */
.btn-domain {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
    padding: 3px 7px; border-radius: 3px; flex-shrink: 0;
    background: rgba(8,145,178,.1); border: 1px solid rgba(8,145,178,.35); color: #0891b2;
    cursor: pointer; transition: all .15s; text-transform: uppercase; white-space: nowrap;
    transform: none; box-shadow: none;
}
.btn-domain:hover { background: rgba(8,145,178,.2); border-color: #0891b2; transform: none; filter: none; }
.btn-domain.copied-domain { background: rgba(22,163,74,.1); border-color: rgba(22,163,74,.4); color: #16a34a; }

@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }
.loading-text { animation: blink 1.2s infinite; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>

    <div id="apiStatus"></div>

<div id="proxyList"></div>

</div><!-- end page-wrap -->

(function() {

    ];
    const FONT_SIZE = 13;
    let cols=0, drops=[], colorsArr=[], speedArr=[], frameCount=0;
    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        cols = Math.floor(canvas.width / FONT_SIZE);
        drops     = Array.from({ length: cols }, (_, i) => drops[i] ?? Math.random() * -80);
        colorsArr = Array.from({ length: cols }, (_, i) => colorsArr[i] ?? COLORS[Math.floor(Math.random() * COLORS.length)]);
        speedArr  = Array.from({ length: cols }, (_, i) => speedArr[i]  ?? (0.3 + Math.random() * 0.7));
    }
    resize(); window.addEventListener('resize', resize);
    function draw() {
        frameCount++;
        ctx.fillStyle = 'rgba(255,255,255, 0.055)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `${FONT_SIZE}px "Space Mono", monospace`;
        for (let i = 0; i < cols; i++) {
            if (frameCount % Math.round(2 / speedArr[i]) !== 0) continue;
            const c = colorsArr[i]; const y = drops[i] * FONT_SIZE;
            ctx.fillStyle = `rgba(255, 255, 255, 0.95)`; ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*FONT_SIZE, y);
            ctx.fillStyle = `rgba(${c.r},${c.g},${c.b}, ${0.55+Math.random()*.25})`; ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*FONT_SIZE, y-FONT_SIZE);
            ctx.fillStyle = `rgba(${c.r},${c.g},${c.b}, 0.25)`; ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*FONT_SIZE, y-FONT_SIZE*2);
            if (y > canvas.height && Math.random() > 0.975) {
                drops[i] = 0; colorsArr[i] = COLORS[Math.floor(Math.random()*COLORS.length)]; speedArr[i] = 0.3+Math.random()*.7;
            }
            drops[i]++;
        }
    }
    setInterval(draw, 22);
})();

                            try {
                                const j = JSON.parse(text);
                                if (j.status === "success") { testKmBtn.innerText = "📈 Tỉ Lệ KM Cao"; testKmBtn.style.background = "rgba(22,163,74,.1)"; testKmBtn.style.borderColor = "rgba(22,163,74,.4)"; testKmBtn.style.color = "#16a34a"; }
                                else { testKmBtn.innerText = "❓ " + (j.message || "?"); testKmBtn.style.background = "rgba(107,114,128,.1)"; testKmBtn.style.color = "#6b7280"; }
                            } catch { testKmBtn.innerText = "❓ Unknown"; testKmBtn.style.background = "rgba(107,114,128,.1)"; }
                        }
                    } catch { testKmBtn.innerText = "❌ Lỗi"; }
                    testKmBtn.disabled = false;
                };
                badgeRow.append(ipLabel, testKmBtn);
            }

            proxyArea.appendChild(badgeRow);
        }

        // Helper: replace IP with domain
        const DOMAIN = "proxyeagle.duckdns.org";
        function toDomain(proxyStr) {
            if (!proxyStr || !d.ip) return proxyStr;
            return proxyStr.replace(d.ip, DOMAIN);
        }

        // Proxy lines: 4 rows, each has a DOMAIN button
        const formats = [];
        if (d.http)         formats.push({ label: "HTTP",   sub: "(ip:port)",   val: d.http,         cls: "http"   });
        if (d.httpuserpass) formats.push({ label: "HTTP",   sub: "(user:pass)", val: d.httpuserpass, cls: "http"   });
        if (d.sock)         formats.push({ label: "SOCKS5", sub: "(ip:port)",   val: d.sock,         cls: "socks5" });
        if (d.sockuserpass) formats.push({ label: "SOCKS5", sub: "(user:pass)", val: d.sockuserpass, cls: "socks5" });

        formats.forEach(({ label, sub, val, cls }) => {
            const domainVal = toDomain(val);

            const row = document.createElement("div");
            row.className = "fproxy-proxy-line";
            row.style.cssText = "cursor:default;";

            // [HTTP] [HTTP DOMAIN]  value  ← layout
            const lbl = document.createElement("span"); lbl.className = `proxy-label ${cls}`; lbl.innerText = label;

            // DOMAIN button — right after the main badge
            const domBtn = document.createElement("button");
            domBtn.className = "btn-domain";
            domBtn.innerText = cls === "http" ? "HTTP DOMAIN" : "SOCKS5 DOMAIN";
            domBtn.title = domainVal;
            domBtn.onclick = async (e) => {
                e.stopPropagation();
                await navigator.clipboard.writeText(domainVal);
                const orig = domBtn.innerText;
                domBtn.innerText = "✅"; domBtn.classList.add("copied-domain");
                setTimeout(() => { domBtn.innerText = orig; domBtn.classList.remove("copied-domain"); }, 1200);
            };

            const sublbl = document.createElement("span"); sublbl.className = "proxy-sublabel"; sublbl.innerText = sub;
            const v = document.createElement("span"); v.className = "proxy-value"; v.innerText = val;

            // Click on value to copy IP version
            const ipZone = document.createElement("span");
            ipZone.style.cssText = "display:flex;align-items:center;flex:1;min-width:0;cursor:pointer;";
            ipZone.title = "Click để copy";
            ipZone.append(v);
            ipZone.onclick = async (e) => {
                e.stopPropagation();
                await navigator.clipboard.writeText(val);
                row.classList.add("copied"); setTimeout(() => row.classList.remove("copied"), 1200);
            };

            row.append(lbl, domBtn, sublbl, ipZone);
            proxyArea.appendChild(row);

            if (cls === "http") { store.httpLines.push(val); store.proxyLines.push(val); }
            else { store.socksLines.push(val); store.proxyLines.push(val); }
        });

        proxyDataStore.set(apiKey, store);
    }

    xoayBtn.onclick = fetchAndRender;

    const actionBtns = document.createElement("div"); actionBtns.className = "action-btns";
    actionBtns.append(xoayBtn, delBtn);
    const actions = document.createElement("div"); actions.className = "proxy-actions";
    actions.append(actionBtns, status);

    box.append(proxyArea, actions);
    proxyList.appendChild(box);
    await fetchAndRender();
}

// ══════════════════════════════════════════════
//  ADD API BUTTON
// ══════════════════════════════════════════════
addApiBtn.onclick = async () => {
    const keys = apiInput.value.trim().split(/\r?\n/).map(k => k.trim()).filter(Boolean);
    let addedEagle = 0, addedFp = 0;

    for (const k of keys) {
        if (savedApis.includes(k) || savedFpKeys.includes(k)) continue;

        if (UUID_REGEX.test(k)) {
            savedApis.push(k);
            await createUuidProxyBox(k);
            addedEagle++;
        } else if (API_MAP[k]) {
            savedApis.push(k);
            createProxyBox(k);
            addedEagle++;
        } else {
            // Treat as fproxy.me key
            savedFpKeys.push(k);
            localStorage.setItem("fproxy_saved_keys", JSON.stringify(savedFpKeys));
            await createFproxyBox(k);
            addedFp++;
        }
    }

    localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));

    let msg = "";
    if (addedEagle) msg += `Eagle: +${addedEagle}`;
    if (addedFp)    msg += `${msg ? "  ·  " : ""}Eagle API: +${addedFp}`;
    if (!msg)       msg = "Không có key mới";
    apiStatus.innerText = msg;
    apiStatus.classList.add("visible");
    apiInput.value = "";
};

// ══════════════════════════════════════════════
//  ROTATE ALL
// ══════════════════════════════════════════════
rotateAllBtn.onclick = async () => {
    const buttons = document.querySelectorAll(".btn-orange, .btn-primary");
    for (const btn of buttons) {
        if (!btn.disabled) { btn.click(); await new Promise(r => setTimeout(r, 800)); }
    }
};

loadApiMap();
</script>
