<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PROXY XOAY EAGLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --surface: #f5f5f8;
    --card: #fafafa;
    --card2: #f0f0f5;
    --border: #e2e2ec;
    --border2: #d0d0de;
    --text: #1a1a2e;
    --muted: #9090a8;
    --muted2: #6a6a88;
    --accent: #5254cc;
    --accent2: #4446b8;
    --orange: #f97316;
    --green: #16a34a;
    --red: #dc2626;
    --blue: #2563eb;
    --purple: #7c3aed;
    --cyan: #0891b2;
    --glow: rgba(82,84,204,.12);
    --glow-sm: rgba(82,84,204,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(82,84,204,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82,84,204,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
}

.page-wrap {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 16px 60px;
}

/* ── SMS Button ── */
.sms-okvip-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    background: linear-gradient(135deg, #f59e0b, #f97316);
    color: #fff;
    padding: 9px 16px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
    border-radius: 6px;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(249,115,22,.25), 0 2px 8px rgba(0,0,0,.12);
    z-index: 999;
    transition: all .2s;
    text-transform: uppercase;
}
.sms-okvip-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 28px rgba(249,115,22,.4), 0 4px 12px rgba(0,0,0,.15);
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 32px; padding-top: 12px; }
.header-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    background: rgba(82,84,204,.07);
    border: 1px solid rgba(82,84,204,.18);
    padding: 3px 10px;
    border-radius: 3px;
}
.header h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, #1a1a2e 0%, var(--accent) 50%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
}
.header-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 8px;
}
.header-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 14px auto 0;
}

/* ── Panel ── */
.panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
}
.panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
    opacity: .4;
}
.panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.panel-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(82,84,204,.5);
}

/* ── Textarea ── */
textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    resize: vertical;
    min-height: 88px;
    transition: border-color .2s, box-shadow .2s;
    line-height: 1.6;
}
textarea::placeholder { color: var(--muted); }
textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow-sm);
}

/* ── Buttons ── */
.btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
    align-items: center;
}
button {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    color: #fff;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
}
button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
button:active:not(:disabled) { transform: translateY(0); filter: brightness(.96); }
button:disabled { opacity: .4; cursor: not-allowed; }

.btn-add {
    background: #ffffff;
    border: 1.5px solid var(--border2);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.btn-add:hover:not(:disabled) { border-color: var(--accent); box-shadow: 0 0 12px var(--glow-sm); color: var(--accent); }

.btn-rotate {
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    box-shadow: 0 2px 10px rgba(82,84,204,.25);
}
.btn-rotate:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(82,84,204,.38); }

.btn-copy {
    background: linear-gradient(135deg, #15803d, #16a34a);
    box-shadow: 0 2px 8px rgba(22,163,74,.18);
}

.btn-delete {
    background: linear-gradient(135deg, #b91c1c, #dc2626);
    box-shadow: 0 2px 8px rgba(220,38,38,.18);
}

/* ── Dynamic button classes (used in JS) ── */
.btn-red {
    background: linear-gradient(135deg, #b91c1c, #dc2626);
    box-shadow: 0 2px 8px rgba(220,38,38,.18);
}
.btn-orange {
    background: linear-gradient(135deg, #c2410c, #ea580c);
    box-shadow: 0 2px 10px rgba(234,88,12,.2);
}
.btn-blue {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    box-shadow: 0 2px 8px rgba(37,99,235,.2);
}
.btn-purple {
    background: linear-gradient(135deg, #6d28d9, #7c3aed);
    box-shadow: 0 2px 8px rgba(124,58,237,.2);
}
.btn-cyan {
    background: linear-gradient(135deg, #0e7490, #0891b2);
    box-shadow: 0 2px 8px rgba(8,145,178,.2);
}
.btn-primary {
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    box-shadow: 0 2px 10px rgba(82,84,204,.25);
}

#apiStatus {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    margin-top: 10px;
    padding: 6px 10px;
    background: var(--surface);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
    display: none;
}
#apiStatus.visible { display: block; }

/* ── Copy All Dropdown ── */
.copy-all-wrapper { position: relative; display: inline-block; }
.copy-all-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: #ffffff;
    border: 1px solid var(--border2);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
    z-index: 200;
    min-width: 200px;
    overflow: hidden;
}
.copy-all-dropdown.open { display: block; animation: dropIn .12s ease; }
@keyframes dropIn { from { opacity:0; transform: translateY(-4px) scale(.98); } to { opacity:1; transform:none; } }
.copy-all-dropdown button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 14px;
    font-size: 12px;
    border-radius: 0;
    background: transparent;
    color: var(--text);
    text-align: left;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transform: none;
    box-shadow: none;
}
.copy-all-dropdown button:last-child { border-bottom: none; }
.copy-all-dropdown button:hover { background: rgba(82,84,204,.06); transform: none; filter: none; }
.copy-all-dropdown button .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-http   { background: var(--blue); }
.dot-socks5 { background: var(--purple); }
.dot-all    { background: conic-gradient(var(--blue) 0% 50%, var(--purple) 50% 100%); }

/* ── Proxy List ── */
#proxyList { display: flex; flex-direction: column; gap: 12px; }

/* ── Proxy Card ── */
.proxy-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
    animation: cardIn .25s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
@keyframes cardIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
.proxy-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(82,84,204,.2), transparent);
}
.proxy-container:hover { border-color: var(--border2); box-shadow: 0 4px 18px rgba(0,0,0,.08); }
.proxy-container.uuid-type { border-left: 2px solid var(--purple); }
.proxy-container.uuid-type::before {
    background: linear-gradient(90deg, transparent, rgba(124,58,237,.2), transparent);
}

/* ── Proxy Text ── */
.proxy-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    word-break: break-all;
    overflow-wrap: anywhere;
    user-select: text;
    color: var(--accent2);
    line-height: 1.6;
    flex: 1;
    overflow-x: auto;
}
.proxy-text.uuid-proxies {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: transparent;
    border: none;
    padding: 0;
}

/* ── Proxy lines ── */
.proxy-line {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
}
.proxy-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 2px 8px;
    border-radius: 3px;
    color: #fff;
    white-space: nowrap;
    text-transform: uppercase;
}
.proxy-label.http   { background: var(--blue); }
.proxy-label.socks5 { background: var(--purple); }
.proxy-value {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
    overflow-wrap: anywhere;
    flex: 1;
    min-width: 0;
}

/* ── Status ── */
.status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    padding: 4px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: nowrap;
    width: 100%;
    text-align: center;
}
@media (min-width: 540px) {
    .status { width: auto; text-align: left; align-self: center; }
}

/* ── Proxy actions wrapper ── */
.proxy-actions {
    display: flex;
    flex-direction: column;
    gap: 7px;
    width: 100%;
}

/* ── Filter row ── */
.filter-row {
    display: flex;
    gap: 6px;
    align-items: center;
    width: 100%;
}
.filter-row input {
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    transition: border-color .2s;
}
.filter-row input::placeholder { color: var(--muted); }
.filter-row input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(8,145,178,.1); }

/* ── Action buttons row ── */
.action-btns {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    width: 100%;
}
.action-btns button {
    flex: 1 1 0;
    min-width: 0;
    font-size: 11px;
    padding: 8px 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    justify-content: center;
}

/* ── Desktop: 1 hàng ── */
@media (min-width: 540px) {
    .proxy-actions { flex-direction: row; align-items: center; }
    .filter-row { flex: 1.6 1 0; width: auto; }
    .action-btns { flex: 3 1 0; width: auto; }
}

/* ── IP row ── */
.ip-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 0 2px;
    flex-wrap: wrap;
}
.real-ip-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
}
.real-ip-label::before { content: '◉'; font-size: 9px; color: var(--green); }

.btn-test-km {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: rgba(217,119,6,.08);
    border: 1px solid rgba(217,119,6,.3);
    color: #b45309;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
}
.btn-test-km:hover:not(:disabled) { background: rgba(217,119,6,.15); border-color: #d97706; transform: none; filter: none; }

/* ── Proxy divider ── */
.proxy-divider { height: 1px; background: var(--border); margin: 2px 0; }

/* ── Loading ── */
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }
.loading-text {
    animation: blink 1.2s infinite;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<a href="SMSOKVIP.html" class="sms-okvip-btn">📱 THUÊ SMS OKVIP</a>

<div class="page-wrap">

<div class="header">
    <div class="header-tag">// ROTATING PROXY SYSTEM v2.0</div>
    <h1>🦅 EAGLE PROXY</h1>
    <div class="header-sub">HIGH-PERFORMANCE · ROTATING · MULTI-PROTOCOL</div>
    <div class="header-line"></div>
</div>

<div class="panel">
    <div class="panel-label">API KEY INPUT</div>
    <textarea id="apiInput" placeholder="Nhập API Key — mỗi dòng 1 key&#10;Hỗ trợ key thường và UUID key&#10;(xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)"></textarea>

    <div class="btn-row">
        <button class="btn-add" id="addApiBtn">＋ THÊM API</button>
        <button class="btn-rotate" id="rotateAllBtn">⟳ XOAY TẤT CẢ</button>

        <div class="copy-all-wrapper" id="copyAllWrapper">
            <button class="btn-copy" id="copyAllBtn">⎘ COPY TẤT CẢ ▾</button>
            <div class="copy-all-dropdown" id="copyAllDropdown">
                <button id="copyHttpBtn"><span class="dot dot-http"></span> Chỉ HTTP</button>
                <button id="copySocksBtn"><span class="dot dot-socks5"></span> Chỉ SOCKS5</button>
                <button id="copyBothBtn"><span class="dot dot-all"></span> HTTP + SOCKS5</button>
            </div>
        </div>
    </div>

    <div id="apiStatus"></div>
</div>

<div id="proxyList"></div>

</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", e => {
    if (e.key === "F12") e.preventDefault();
    if (e.ctrlKey && e.key.toLowerCase() === "u") e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.ctrlKey && ["s","p"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.ctrlKey && e.key.toLowerCase() === "a") return;
});

const UUID_REGEX    = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
const UUID_API_BASE = "https://svproxy2.nguyenanlk2872.workers.dev/proxy/access_key/";
let API_MAP = {};
const API_MAP_URL = "https://raw.githubusercontent.com/nguyenan177/apiv2/refs/heads/main/api_map.json";

const apiInput     = document.getElementById("apiInput");
const addApiBtn    = document.getElementById("addApiBtn");
const rotateAllBtn = document.getElementById("rotateAllBtn");
const apiStatus    = document.getElementById("apiStatus");
const proxyList    = document.getElementById("proxyList");

const copyAllBtn      = document.getElementById("copyAllBtn");
const copyAllDropdown = document.getElementById("copyAllDropdown");
const copyAllWrapper  = document.getElementById("copyAllWrapper");

copyAllBtn.onclick = (e) => {
    e.stopPropagation();
    copyAllDropdown.classList.toggle("open");
};
document.addEventListener("click", (e) => {
    if (!copyAllWrapper.contains(e.target)) copyAllDropdown.classList.remove("open");
});

async function copyAndFlash(lines, btn, label) {
    if (!lines.length) { alert("Không có proxy để copy"); return; }
    await navigator.clipboard.writeText(lines.join("\n"));
    copyAllDropdown.classList.remove("open");
    const orig = btn.innerHTML;
    btn.innerHTML = `✅ ĐÃ COPY ${lines.length} PROXY`;
    setTimeout(() => btn.innerHTML = orig, 1500);
}

document.getElementById("copyHttpBtn").onclick = async () => {
    const lines = [];
    document.querySelectorAll(".proxy-text:not(.uuid-proxies)").forEach(el => { const t = el.innerText.trim(); if (t) lines.push(t); });
    document.querySelectorAll(".proxy-container.uuid-type").forEach(b => { if (b._httpLines) lines.push(...b._httpLines); });
    await copyAndFlash(lines, document.getElementById("copyHttpBtn"), "HTTP");
};

document.getElementById("copySocksBtn").onclick = async () => {
    const lines = [];
    document.querySelectorAll(".proxy-container.uuid-type").forEach(b => { if (b._socksLines) lines.push(...b._socksLines); });
    await copyAndFlash(lines, document.getElementById("copySocksBtn"), "SOCKS5");
};

document.getElementById("copyBothBtn").onclick = async () => {
    const lines = [];
    document.querySelectorAll(".proxy-text:not(.uuid-proxies)").forEach(el => { const t = el.innerText.trim(); if (t) lines.push(t); });
    document.querySelectorAll(".proxy-container.uuid-type").forEach(b => { if (b._proxyLines) lines.push(...b._proxyLines); });
    await copyAndFlash(lines, document.getElementById("copyBothBtn"), "HTTP + SOCKS5");
};

let savedApis = JSON.parse(localStorage.getItem("proxy_api_keys") || "[]");

async function loadApiMap() {
    try {
        const res = await fetch(API_MAP_URL, { cache: "no-store" });
        API_MAP = await res.json();
        proxyList.innerHTML = "";
        savedApis.forEach(k => UUID_REGEX.test(k) ? createUuidProxyBox(k) : createProxyBox(k));
    } catch(err) {
        alert("❌ Không tải được API MAP");
    }
}

function buildHttpProxy(p)   { return `${p.host}:${p.port}:${p.username}:${p.password}`; }
function buildSocks5Proxy(p) { return `${p.host}:${p.socks5_port}:${p.username}:${p.password}`; }

async function createUuidProxyBox(apiKey) {
    const box = document.createElement("div");
    box.className = "proxy-container uuid-type";
    box.dataset.uuid = apiKey;

    const proxyArea = document.createElement("div");
    proxyArea.className = "proxy-text uuid-proxies";
    proxyArea.innerHTML = `<span class="loading-text">⏳ Đang tải proxy...</span>`;

    const status = document.createElement("span");
    status.className = "status";

    const changeIpBtn = document.createElement("button");
    changeIpBtn.className = "btn-orange";
    changeIpBtn.innerHTML = "🌐 ĐỔI IP";

    const delBtn = document.createElement("button");
    delBtn.className = "btn-red";
    delBtn.innerHTML = "✕ XÓA";
    delBtn.onclick = () => {
        savedApis = savedApis.filter(k => k !== apiKey);
        localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));
        box.style.animation = "none";
        box.style.opacity = "0";
        box.style.transform = "translateY(-6px)";
        box.style.transition = "all .2s";
        setTimeout(() => proxyList.removeChild(box), 200);
    };

    async function fetchAndRender() {
        changeIpBtn.disabled = true;
        status.innerText = "Đang tải...";
        proxyArea.innerHTML = `<span class="loading-text">⏳ Đang tải proxy...</span>`;
        const url = UUID_API_BASE + apiKey;
        try {
            const res  = await fetch(url, { cache: "no-store" });
            const data = await res.json();

            if (data.status !== "success" || !data.proxies) {
                proxyArea.innerText = "⚠️ Không lấy được proxy";
                status.innerText = "❌ Lỗi";
                changeIpBtn.disabled = false;
                return;
            }

            const entries = Object.values(data.proxies);
            if (!entries.length) {
                proxyArea.innerText = "⚠️ Không có proxy nào";
                status.innerText = "";
                changeIpBtn.disabled = false;
                return;
            }

            box._proxyLines = []; box._httpLines = []; box._socksLines = [];
            box._proxyIds   = entries.map(p => p.id);
            proxyArea.innerHTML = "";

            entries.forEach((p, idx) => {
                const http   = buildHttpProxy(p);
                const socks5 = buildSocks5Proxy(p);
                box._proxyLines.push(http, socks5);
                box._httpLines.push(http);
                box._socksLines.push(socks5);

                if (idx > 0) {
                    const div2 = document.createElement("div");
                    div2.className = "proxy-divider";
                    proxyArea.appendChild(div2);
                }

                const rowH = document.createElement("div"); rowH.className = "proxy-line";
                const lH = document.createElement("span"); lH.className = "proxy-label http"; lH.innerText = "HTTP";
                const vH = document.createElement("span"); vH.className = "proxy-value"; vH.innerText = http;
                rowH.append(lH, vH);

                const rowIP = document.createElement("div");
                rowIP.className = "ip-info-row";

                const realIpText = document.createElement("span");
                realIpText.className = "real-ip-label";
                realIpText.innerText = p.real_ip || "";

                const testKmBtn = document.createElement("button");
                testKmBtn.className = "btn-test-km";
                testKmBtn.innerText = "TEST KM";
                testKmBtn.onclick = async () => {
                    const ip = p.real_ip;
                    if (!ip) return;
                    testKmBtn.disabled = true;
                    testKmBtn.innerText = "⏳...";
                    try {
                        const res = await fetch("https://testdodam.nguyenanlk2872.workers.dev/?ip=" + ip, { cache: "no-store" });
                        const text = await res.text();
                        if (text.includes("Duplicate entry")) {
                            testKmBtn.innerText = "📉 Tỉ Lệ KM Thấp";
                            testKmBtn.style.background = "rgba(220,38,38,.1)";
                            testKmBtn.style.borderColor = "rgba(220,38,38,.4)";
                            testKmBtn.style.color = "#dc2626";
                        } else {
                            try {
                                const json = JSON.parse(text);
                                if (json.status === "success") {
                                    testKmBtn.innerText = "📈 Tỉ Lệ KM Cao";
                                    testKmBtn.style.background = "rgba(22,163,74,.1)";
                                    testKmBtn.style.borderColor = "rgba(22,163,74,.4)";
                                    testKmBtn.style.color = "#16a34a";
                                } else {
                                    testKmBtn.innerText = "❓ " + (json.message || "?");
                                    testKmBtn.style.background = "rgba(107,114,128,.1)";
                                    testKmBtn.style.color = "#6b7280";
                                }
                            } catch {
                                testKmBtn.innerText = "❓ Unknown";
                                testKmBtn.style.background = "rgba(107,114,128,.1)";
                            }
                        }
                    } catch {
                        testKmBtn.innerText = "❌ Lỗi";
                    }
                    testKmBtn.disabled = false;
                };

                rowIP.append(realIpText, testKmBtn);

                const rowS = document.createElement("div"); rowS.className = "proxy-line";
                const lS = document.createElement("span"); lS.className = "proxy-label socks5"; lS.innerText = "SOCKS5";
                const vS = document.createElement("span"); vS.className = "proxy-value"; vS.innerText = socks5;
                rowS.append(lS, vS);

                proxyArea.append(rowH, rowIP, rowS);
            });

            status.innerText = `✅ ${entries.length} proxy`;
        } catch(err) {
            proxyArea.innerText = "❌ Lỗi kết nối";
            status.innerText = "❌";
        }
        changeIpBtn.disabled = false;
    }

    async function changeAllIPs() {
        const ids = box._proxyIds || [];
        if (!ids.length) { status.innerText = "⚠️ Chưa có proxy"; return; }
        changeIpBtn.disabled = true;
        status.innerText = "⏳ Đổi IP...";
        try {
            let ok = 0, fail = 0;
            for (const id of ids) {
                const url = `${UUID_API_BASE}${apiKey}/update?filter_ip=&minute_change_ip=&id=${id}&change_ip=yes`;
                const res  = await fetch(url, { cache: "no-store" });
                const data = await res.json();

                let portMsg = "";
                let portError = false;
                if (data.data && typeof data.data === "object") {
                    const portObj = Object.values(data.data).find(v => v && typeof v === "object" && v.status);
                    if (portObj) {
                        portError = portObj.status === "error";
                        portMsg   = portObj.msg || "";
                    }
                }

                if (data.status === "success" && !portError) {
                    ok++;
                } else {
                    fail++;
                    const showMsg = portMsg || data.msg || data.message || "Lỗi đổi IP";
                    status.innerText = "⏳ " + showMsg;
                }
            }
            if (ok > 0) {
                status.innerText = "✅ Xoay xong";
                setTimeout(fetchAndRender, 1500);
            } else {
                changeIpBtn.disabled = false;
            }
        } catch(err) {
            status.innerText = "❌ Lỗi đổi IP";
            changeIpBtn.disabled = false;
        }
    }

    const copyHttpBtn2 = document.createElement("button");
    copyHttpBtn2.className = "btn-blue";
    copyHttpBtn2.innerHTML = "HTTP";
    copyHttpBtn2.onclick = async () => {
        const lines = box._httpLines || [];
        if (!lines.length) { alert("Chưa có proxy HTTP"); return; }
        await navigator.clipboard.writeText(lines.join("\n"));
        copyHttpBtn2.innerHTML = "✅"; setTimeout(() => copyHttpBtn2.innerHTML = "HTTP", 800);
    };

    const copySocksBtn2 = document.createElement("button");
    copySocksBtn2.className = "btn-purple";
    copySocksBtn2.innerHTML = "SOCKS5";
    copySocksBtn2.onclick = async () => {
        const lines = box._socksLines || [];
        if (!lines.length) { alert("Chưa có proxy SOCKS5"); return; }
        await navigator.clipboard.writeText(lines.join("\n"));
        copySocksBtn2.innerHTML = "✅"; setTimeout(() => copySocksBtn2.innerHTML = "SOCKS5", 800);
    };

    async function filterIp() {
        const ipPrefix = filterInput.value.trim();
        if (!ipPrefix) { alert("Nhập đầu IP muốn lọc"); return; }
        const ids = box._proxyIds || [];
        if (!ids.length) { status.innerText = "⚠️ Chưa có proxy"; return; }
        filterBtn.disabled = true;
        status.innerText = "⏳ Lọc IP...";
        try {
            let ok = 0, fail = 0;
            for (const id of ids) {
                const url = `${UUID_API_BASE}${apiKey}/update?filter_ip=${encodeURIComponent(ipPrefix)}&minute_change_ip=0&id=${id}&change_ip=`;
                const res  = await fetch(url, { cache: "no-store" });
                const data = await res.json();
                let portMsg = "";
                let portError = false;
                if (data.data && typeof data.data === "object") {
                    const portObj = Object.values(data.data).find(v => v && typeof v === "object" && v.status);
                    if (portObj) { portError = portObj.status === "error"; portMsg = portObj.msg || ""; }
                }
                if (data.status === "success" && !portError) { ok++; }
                else { fail++; status.innerText = "⏳ " + (portMsg || data.msg || data.message || "Lỗi lọc IP"); }
            }
            if (ok > 0) { status.innerText = "✅ Lọc IP xong"; setTimeout(fetchAndRender, 1500); }
        } catch(err) { status.innerText = "❌ Lỗi lọc IP"; }
        filterBtn.disabled = false;
    }

    changeIpBtn.onclick = changeAllIPs;

    const filterInput = document.createElement("input");
    filterInput.type = "text";
    filterInput.placeholder = "Lọc đầu IP (vd: 27)";
    filterInput.addEventListener("keydown", e => { if (e.key === "Enter") filterIp(); });

    const filterBtn = document.createElement("button");
    filterBtn.className = "btn-cyan";
    filterBtn.innerHTML = "🔍 Lọc IP";
    filterBtn.onclick = filterIp;

    const filterRow = document.createElement("div");
    filterRow.className = "filter-row";
    filterRow.append(filterInput, filterBtn);

    const actionBtns = document.createElement("div");
    actionBtns.className = "action-btns";
    actionBtns.append(copyHttpBtn2, copySocksBtn2, changeIpBtn, delBtn);

    const actions = document.createElement("div");
    actions.className = "proxy-actions";
    actions.append(filterRow, actionBtns);

    const proxyBody = document.createElement("div");
    proxyBody.className = "proxy-body";
    proxyBody.append(proxyArea);

    const proxyFooter = document.createElement("div");
    proxyFooter.className = "proxy-footer";
    proxyFooter.append(actions, status);

    box.append(proxyBody, proxyFooter);
    proxyList.appendChild(box);
    await fetchAndRender();
}

function createProxyBox(apiKey) {
    const info = API_MAP[apiKey];
    if (!info) return;
    const box = document.createElement("div"); box.className = "proxy-container";

    const proxyText = document.createElement("div"); proxyText.className = "proxy-text"; proxyText.innerText = info.proxy;

    const copyBtn = document.createElement("button"); copyBtn.className = "btn-copy"; copyBtn.innerHTML = "⎘ COPY";
    copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(proxyText.innerText);
        copyBtn.innerHTML = "✅ Copied"; setTimeout(() => copyBtn.innerHTML = "⎘ COPY", 800);
    };

    const rotateBtn = document.createElement("button"); rotateBtn.className = "btn-primary"; rotateBtn.innerHTML = "⟳ Xoay";
    const status = document.createElement("span"); status.className = "status";

    rotateBtn.onclick = async () => {
        rotateBtn.disabled = true; status.innerText = "⏳ Xoay...";
        try {
            let url = info.rotate;
            if (url.includes("reset?proxy=")) url += encodeURIComponent(info.proxy);
            else url += apiKey;
            const res  = await fetch(url);
            const data = await res.json();
            if (data.success === false) {
                status.innerText = "⚠️ " + (data.message || "Không xoay được");
            } else {
                if (data.data?.proxy) { info.proxy = data.data.proxy; proxyText.innerText = data.data.proxy; }
                status.innerText = "✅ Xoay xong";
            }
        } catch(err) {
            status.innerText = "❌ Bình tẽn xoay tutu";
        }
        rotateBtn.disabled = false;
    };

    const delBtn = document.createElement("button"); delBtn.className = "btn-red"; delBtn.innerHTML = "✕ XÓA";
    delBtn.onclick = () => {
        savedApis = savedApis.filter(k => k !== apiKey);
        localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));
        box.style.opacity = "0";
        box.style.transform = "translateY(-6px)";
        box.style.transition = "all .2s";
        setTimeout(() => proxyList.removeChild(box), 200);
    };

    const actions = document.createElement("div"); actions.className = "proxy-actions";
    actions.append(copyBtn, rotateBtn, delBtn);

    const proxyBody2 = document.createElement("div");
    proxyBody2.className = "proxy-body";
    proxyBody2.append(proxyText);

    const proxyFooter2 = document.createElement("div");
    proxyFooter2.className = "proxy-footer";
    proxyFooter2.style.flexDirection = "row";
    proxyFooter2.style.flexWrap = "wrap";
    proxyFooter2.style.alignItems = "center";
    proxyFooter2.append(actions, status);

    box.append(proxyBody2, proxyFooter2);
    proxyList.appendChild(box);
}

addApiBtn.onclick = async () => {
    const keys = apiInput.value.trim().split(/\r?\n/).map(k => k.trim()).filter(Boolean);
    let a = 0, s = 0, i = 0;
    for (const k of keys) {
        if (savedApis.includes(k)) { s++; continue; }
        if (UUID_REGEX.test(k)) {
            savedApis.push(k);
            await createUuidProxyBox(k); a++;
        } else {
            if (!API_MAP[k]) { i++; continue; }
            savedApis.push(k); createProxyBox(k); a++;
        }
    }
    localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));
    apiStatus.innerText = `+ Thêm ${a}  ·  ~ Trùng ${s}  ·  ✕ Sai ${i}`;
    apiStatus.classList.add("visible");
    apiInput.value = "";
};

rotateAllBtn.onclick = async () => {
    const buttons = document.querySelectorAll(".btn-rotate");
    for (const btn of buttons) {
        if (!btn.disabled) { btn.click(); await new Promise(r => setTimeout(r, 600)); }
    }
};

loadApiMap();
</script>
