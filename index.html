<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🦅 EAGLE PROXY — FIRE EDITION</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Black+Ops+One&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0a0604;
    --surface: #1a1008;
    --card: #130c05;
    --border: #2a1a08;
    --border2: #3a2510;
    --text: #f5e6d0;
    --muted: #7a5a3a;
    --muted2: #a07848;
    --fire1: #ff6a00;
    --fire2: #ff3d00;
    --fire3: #ffb300;
    --fire4: #ff1744;
    --ember: #ff8c00;
    --green: #00e676;
    --blue: #448aff;
    --purple: #e040fb;
    --cyan: #00e5ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
}
#fire-bg { position:fixed;inset:0;z-index:0;pointer-events:none; }
#ember-canvas { position:fixed;inset:0;z-index:2;pointer-events:none; }
.vignette {
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
        radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255,80,0,.07) 0%, transparent 70%),
        radial-gradient(ellipse 100% 100% at 50% 100%, rgba(0,0,0,.9) 0%, transparent 55%),
        radial-gradient(ellipse 60% 100% at 0% 50%, rgba(0,0,0,.55) 0%, transparent 50%),
        radial-gradient(ellipse 60% 100% at 100% 50%, rgba(0,0,0,.55) 0%, transparent 50%);
}
.page-wrap { position:relative;z-index:10;max-width:860px;margin:0 auto;padding:20px 16px 60px; }

.sms-okvip-btn {
    position:fixed;top:16px;right:16px;
    background:linear-gradient(135deg,#7f0000,#b71c1c);
    color:#ffcc80;padding:9px 16px;font-size:12px;font-weight:700;
    font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;border-radius:5px;
    text-decoration:none;box-shadow:0 0 20px rgba(255,30,0,.3),0 2px 8px rgba(0,0,0,.5);
    z-index:999;transition:all .2s;text-transform:uppercase;border:1px solid rgba(255,80,0,.3);
}
.sms-okvip-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(255,60,0,.5),0 4px 16px rgba(0,0,0,.5);color:#fff;}

/* HEADER */
.header{text-align:center;margin-bottom:28px;padding-top:8px;}
#eagle-canvas{display:block;margin:0 auto;filter:drop-shadow(0 0 30px rgba(255,100,0,.8)) drop-shadow(0 0 70px rgba(255,40,0,.4));}
.header-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;color:var(--ember);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;background:rgba(255,100,0,.08);border:1px solid rgba(255,100,0,.25);padding:3px 10px;border-radius:3px;}
.header h1{font-family:'Black Ops One',sans-serif;font-size:48px;font-weight:400;letter-spacing:4px;line-height:1;background:linear-gradient(180deg,#fff5e0 0%,#ffb300 30%,#ff6a00 65%,#ff1744 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,100,0,.5));}
.header-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:3px;margin-top:6px;}
.header-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--fire1),var(--fire3),var(--fire1),transparent);margin:12px auto 0;animation:linePulse 2s ease-in-out infinite;}
@keyframes linePulse{0%,100%{opacity:.6;width:120px}50%{opacity:1;width:200px}}

/* PANEL */
.panel{background:rgba(19,12,5,0.87);border:1px solid var(--border2);border-radius:8px;padding:18px;margin-bottom:16px;position:relative;overflow:visible;box-shadow:0 0 0 1px rgba(255,80,0,.05),0 4px 24px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,150,50,.07);backdrop-filter:blur(6px);}
.panel::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--fire1),var(--fire3),var(--fire1),transparent);opacity:.5;}
.panel-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.panel-label::before{content:'';display:inline-block;width:6px;height:6px;background:var(--fire1);border-radius:50%;box-shadow:0 0 8px var(--fire1),0 0 16px rgba(255,106,0,.4);animation:dotPulse 1.5s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{box-shadow:0 0 8px var(--fire1),0 0 16px rgba(255,106,0,.4)}50%{box-shadow:0 0 14px var(--fire3),0 0 28px rgba(255,180,0,.6)}}

textarea{width:100%;background:rgba(10,6,4,.7);border:1px solid var(--border2);border-radius:6px;padding:12px 14px;font-family:'Space Mono',monospace;font-size:12px;color:#e8c080;resize:vertical;min-height:88px;transition:border-color .2s,box-shadow .2s;line-height:1.6;}
textarea::placeholder{color:var(--muted);}
textarea:focus{outline:none;border-color:var(--fire1);box-shadow:0 0 0 2px rgba(255,106,0,.12);}

.copy-all-dropdown button{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;font-size:12px;border-radius:0;background:transparent;color:var(--text);border-bottom:1px solid var(--border);transform:none;box-shadow:none;}

.proxy-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:2px 8px;border-radius:3px;color:#fff;white-space:nowrap;text-transform:uppercase;}

.proxy-value{font-family:'Space Mono',monospace;font-size:12px;color:#d4a060;word-break:break-all;overflow-wrap:anywhere;flex:1;min-width:0;}

.proxy-actions{display:flex;flex-direction:column;gap:7px;width:100%;}

.ip-info-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:0 2px;flex-wrap:wrap;}
.real-ip-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted2);display:flex;align-items:center;gap:4px;}
.real-ip-label::before{content:'◉';font-size:9px;color:var(--green);}
.btn-test-km{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;background:rgba(255,100,0,.08);border:1px solid rgba(255,100,0,.25);color:var(--ember);padding:3px 10px;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

</style>

<script>
// ═══════════════════════════════════════════
//  🔥 FIRE BG — cellular automata
// ═══════════════════════════════════════════
(function(){
    const cv=document.getElementById('fire-bg'), ctx=cv.getContext('2d');
    const S=4; // cell size px
    let W,H,cols,rows,buf;

    function makePal(){
        const p=[];
        for(let i=0;i<256;i++){
            let r=0,g=0,b=0,a=0;
            if(i<40){a=0;}
            else if(i<80){const t=(i-40)/40;r=Math.round(160*t);a=Math.round(160*t);}
            else if(i<130){const t=(i-80)/50;r=160+Math.round(80*t);g=Math.round(60*t);a=180+Math.round(40*t);}
            else if(i<190){const t=(i-130)/60;r=240;g=60+Math.round(130*t);a=210;}
            else if(i<230){const t=(i-190)/40;r=255;g=190+Math.round(50*t);b=Math.round(50*t);a=225;}
            else{const t=(i-230)/25;r=255;g=240;b=50+Math.round(140*t);a=240;}
            p.push([r,g,b,a]);
        }
        return p;
    }
    const PAL=makePal();

    function resize(){
        cv.width=window.innerWidth; cv.height=window.innerHeight;
        W=cv.width; H=cv.height;
        cols=Math.ceil(W/S)+2; rows=Math.ceil(H/S)+4;
        buf=new Uint8Array(cols*rows);
        for(let x=0;x<cols;x++){
            buf[(rows-1)*cols+x]=210+Math.random()*45|0;
            buf[(rows-2)*cols+x]=195+Math.random()*60|0;
        }
    }
    resize(); window.addEventListener('resize',resize);

    function step(){
        for(let x=0;x<cols;x++){
            buf[(rows-1)*cols+x]=Math.random()>.1?205+Math.random()*50|0:0;
            buf[(rows-2)*cols+x]=Math.random()>.2?190+Math.random()*65|0:buf[(rows-2)*cols+x];
        }
        for(let y=0;y<rows-1;y++){
            for(let x=0;x<cols;x++){
                const b=buf[(y+1)*cols+x];
                const b2=y+2<rows?buf[(y+2)*cols+x]:b;
                const l=buf[(y+1)*cols+Math.max(0,x-1)];
                const r2=buf[(y+1)*cols+Math.min(cols-1,x+1)];
                let v=(b+b2+l+r2)/4.0-(Math.random()*2.6);
                buf[y*cols+x]=Math.max(0,Math.min(255,v|0));
            }
        }
    }

    function render(){
        const img=ctx.createImageData(W,H); const d=img.data;
        for(let y=0;y<rows&&y*S<H;y++){
            for(let x=0;x<cols&&x*S<W;x++){
                const [r,g,b,a]=PAL[buf[y*cols+x]];
                for(let py=0;py<S&&y*S+py<H;py++){
                    for(let px=0;px<S&&x*S+px<W;px++){
                        const i=((y*S+py)*W+(x*S+px))*4;
                        d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;
                    }
                }
            }
        }
        ctx.putImageData(img,0,0);
    }

    (function loop(){step();render();requestAnimationFrame(loop);})();
})();

// ═══════════════════════════════════════════
//  🔥 EMBER PARTICLES
// ═══════════════════════════════════════════
(function(){
    const cv=document.getElementById('ember-canvas'), ctx=cv.getContext('2d');
    function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
    resize(); window.addEventListener('resize',resize);
    const COLS=['#ff6a00','#ff3d00','#ffb300','#ff8c00','#ff1744','#fff59d','#ffcc02'];
    const embers=[];
    class Ember{
        constructor(){
            this.x=Math.random()*window.innerWidth;
            this.y=window.innerHeight+10;
            this.vx=(Math.random()-.5)*1.4;
            this.vy=-(1.8+Math.random()*4);
            this.r=.8+Math.random()*2.5;
            this.life=1; this.decay=.004+Math.random()*.012;
            this.color=COLS[Math.floor(Math.random()*COLS.length)];
            this.w=Math.random()*Math.PI*2; this.ws=.04+Math.random()*.09;
        }
        update(){this.w+=this.ws;this.vx+=Math.sin(this.w)*.07;this.vy+=(Math.random()-.5)*.04-.025;this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.r*=.998;}
        draw(){
            ctx.save();ctx.globalAlpha=Math.max(0,this.life*.9);
            ctx.shadowColor=this.color;ctx.shadowBlur=7;ctx.fillStyle=this.color;
            ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.restore();
        }
    }
    for(let i=0;i<100;i++){const e=new Ember();e.y=Math.random()*window.innerHeight;e.life=Math.random();embers.push(e);}
    (function loop(){
        ctx.clearRect(0,0,cv.width,cv.height);
        if(Math.random()<.65) embers.push(new Ember());
        for(let i=embers.length-1;i>=0;i--){embers[i].update();embers[i].draw();if(embers[i].life<=0||embers[i].y<-20)embers.splice(i,1);}
        while(embers.length>220)embers.shift();
        requestAnimationFrame(loop);
    })();
})();

// ═══════════════════════════════════════════
//  🦅 EAGLE — animated canvas drawing
// ═══════════════════════════════════════════
(function(){
    const cv=document.getElementById('eagle-canvas'), ctx=cv.getContext('2d');
    const W=cv.width, H=cv.height;
    let t=0;
    const pts=[];

    class FlamePt{
        constructor(x,y){
            this.x=x;this.y=y;
            this.vx=(Math.random()-.5)*1.8;
            this.vy=-(1+Math.random()*3.5);
            this.life=1; this.decay=.02+Math.random()*.035;
            this.r=1.2+Math.random()*3.5;
        }
        update(){this.x+=this.vx;this.y+=this.vy;this.vy-=.05;this.vx+=(Math.random()-.5)*.1;this.life-=this.decay;this.r*=.975;}
        draw(){
            if(this.life<=0)return;
            const a=Math.max(0,this.life);
            const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.5);
            g.addColorStop(0,`rgba(255,245,140,${a})`);
            g.addColorStop(.35,`rgba(255,130,0,${a*.85})`);
            g.addColorStop(.7,`rgba(255,30,0,${a*.5})`);
            g.addColorStop(1,'rgba(100,0,0,0)');
            ctx.fillStyle=g;
            ctx.beginPath();ctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);ctx.fill();
        }
    }

    function drawEagle(t){
        const cx=W/2, cy=H/2+15;
        const flap=Math.sin(t*2.4)*14;
        const breathe=Math.sin(t*1.2)*1.5;

        ctx.save();
