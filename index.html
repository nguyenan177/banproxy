<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xoay IP Proxy Nhiều API</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --primary: #1f2937;
    --accent: #2563eb;
    --success: #16a34a;
    --danger: #dc2626;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 16px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
}
.sms-okvip-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    background: #f59e0b;
    color: #fff;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(0,0,0,.15);
    z-index: 999;
}
.sms-okvip-btn:hover { opacity: .9; }
h2 {
    text-align: center;
    margin-bottom: 18px;
    font-weight: 600;
    color: var(--primary);
}
.box {
    background: var(--card);
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
}
textarea {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    resize: vertical;
    min-height: 90px;
}
textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(37,99,235,.15);
}
button {
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    color: #fff;
}
button:disabled { opacity: .6; cursor: not-allowed; }
.btn-add { background: var(--primary); }
.btn-rotate { background: var(--accent); }
.btn-copy { background: var(--success); }
.btn-delete { background: var(--danger); }
#apiStatus {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
}
#proxyList {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.proxy-container {
    background: var(--card);
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.proxy-container.uuid-type {
    border-left: 3px solid #7c3aed;
}
.proxy-text {
    font-family: monospace;
    font-size: 13px;
    background: #f9fafb;
    border: 1px dashed var(--border);
    padding: 10px;
    border-radius: 6px;
    word-break: break-all;
    user-select: text;
}
.proxy-text.uuid-proxies {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.proxy-line {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}
.proxy-label {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    color: #fff;
    white-space: nowrap;
}
.proxy-label.http   { background: #2563eb; }
.proxy-label.socks5 { background: #7c3aed; }
.proxy-value {
    font-family: monospace;
    font-size: 13px;
    word-break: break-all;
}
.proxy-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.status {
    font-size: 12px;
    color: var(--muted);
}
@media (min-width: 768px) {
    .proxy-container { flex-direction: row; align-items: center; }
    .proxy-text { flex: 1; }
    .status { min-width: 150px; text-align: right; }
}


</style>
</head>
<body>

<a href="SMSOKVIP.html" class="sms-okvip-btn">📱 Thuê SMS OKVIP</a>

<h2>🔄 Xoay IP Proxy Nhiều API</h2>

<div class="box">
    <textarea id="apiInput" placeholder="🔑 Nhập API Key (mỗi dòng 1 key)&#10;Hỗ trợ key thường và key UUID (xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)"></textarea>
    <button class="btn-add" id="addApiBtn">➕ Thêm API</button>
    <button class="btn-rotate" id="rotateAllBtn">🔄 Xoay tất cả</button>
    <button class="btn-copy" id="copyAllBtn">📋 Copy tất cả</button>
    <div id="apiStatus"></div>
</div>

<div id="proxyList"></div>


<script>
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", e => {
    if (e.key === "F12") e.preventDefault();
    if (e.ctrlKey && e.key.toLowerCase() === "u") e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.ctrlKey && ["s","p"].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.ctrlKey && e.key.toLowerCase() === "a") return;
});

// ─── Hằng số ─────────────────────────────────────────────────
const UUID_REGEX    = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
const UUID_API_BASE = "https://svproxy2.nguyenanlk2872.workers.dev/proxy/access_key/";
let API_MAP = {};
const API_MAP_URL = "https://raw.githubusercontent.com/nguyenan177/apiv2/refs/heads/main/api_map.json";

const apiInput     = document.getElementById("apiInput");
const addApiBtn    = document.getElementById("addApiBtn");
const rotateAllBtn = document.getElementById("rotateAllBtn");
const copyAllBtn   = document.getElementById("copyAllBtn");
const apiStatus    = document.getElementById("apiStatus");
const proxyList    = document.getElementById("proxyList");
let savedApis = JSON.parse(localStorage.getItem("proxy_api_keys") || "[]");

// ─── Load API MAP ─────────────────────────────────────────────
async function loadApiMap() {
    try {
        const res = await fetch(API_MAP_URL, { cache: "no-store" });
        API_MAP = await res.json();
        proxyList.innerHTML = "";
        savedApis.forEach(k => UUID_REGEX.test(k) ? createUuidProxyBox(k) : createProxyBox(k));
    } catch(err) {
        alert("❌ Không tải được API MAP");
    }
}

// ─── Helpers ─────────────────────────────────────────────────
function buildHttpProxy(p)   { return `${p.host}:${p.port}:${p.username}:${p.password}`; }
function buildSocks5Proxy(p) { return `${p.host}:${p.socks5_port}:${p.username}:${p.password}`; }

// ─── Box UUID ─────────────────────────────────────────────────
async function createUuidProxyBox(apiKey) {
    const box = document.createElement("div");
    box.className = "proxy-container uuid-type";
    box.dataset.uuid = apiKey;

    const proxyArea = document.createElement("div");
    proxyArea.className = "proxy-text uuid-proxies";
    proxyArea.innerText = "⏳ Đang tải proxy...";

    const status = document.createElement("span");
    status.className = "status";

    const changeIpBtn = document.createElement("button");
    changeIpBtn.className = "btn-rotate";
    changeIpBtn.style.background = "#ea580c";
    changeIpBtn.innerText = "🌐 Đổi IP";

    const delBtn = document.createElement("button");
    delBtn.className = "btn-delete";
    delBtn.innerText = "❌";
    delBtn.onclick = () => {
        savedApis = savedApis.filter(k => k !== apiKey);
        localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));
        proxyList.removeChild(box);
    };

    async function fetchAndRender() {
        changeIpBtn.disabled = true;
        status.innerText = "⏳ Đang tải...";
        proxyArea.innerHTML = "";
        const url = UUID_API_BASE + apiKey;
        try {
            const res  = await fetch(url, { cache: "no-store" });
            const data = await res.json();


            if (data.status !== "success" || !data.proxies) {
                proxyArea.innerText = "⚠️ Không lấy được proxy";
                status.innerText = "❌ Lỗi";
                changeIpBtn.disabled = false;
                return;
            }

            const entries = Object.values(data.proxies);

            if (!entries.length) {
                proxyArea.innerText = "⚠️ Không có proxy nào";
                status.innerText = "";
                changeIpBtn.disabled = false;
                return;
            }

            box._proxyLines = []; box._httpLines = []; box._socksLines = [];
            box._proxyIds   = entries.map(p => p.id);

            entries.forEach(p => {
                const http   = buildHttpProxy(p);
                const socks5 = buildSocks5Proxy(p);
                box._proxyLines.push(http, socks5);
                box._httpLines.push(http);
                box._socksLines.push(socks5);



                const rowH = document.createElement("div"); rowH.className = "proxy-line";
                const lH = document.createElement("span"); lH.className = "proxy-label http"; lH.innerText = "HTTP";
                const vH = document.createElement("span"); vH.className = "proxy-value"; vH.innerText = http;
                rowH.append(lH, vH);

                const rowS = document.createElement("div"); rowS.className = "proxy-line";
                const lS = document.createElement("span"); lS.className = "proxy-label socks5"; lS.innerText = "SOCKS5";
                const vS = document.createElement("span"); vS.className = "proxy-value"; vS.innerText = socks5;
                rowS.append(lS, vS);

                proxyArea.append(rowH, rowS);
            });

            status.innerText = `✅ ${entries.length} proxy`;
        } catch(err) {
            proxyArea.innerText = "❌ Lỗi kết nối";
            status.innerText = "❌";
        }
        changeIpBtn.disabled = false;
    }

    async function changeAllIPs() {
        const ids = box._proxyIds || [];
        if (!ids.length) { status.innerText = "⚠️ Chưa có proxy"; return; }
        changeIpBtn.disabled = true;
        status.innerText = "⏳ Đang đổi IP...";
        try {
            let ok = 0, fail = 0;
            for (const id of ids) {
                const url = `${UUID_API_BASE}${apiKey}/update?filter_ip=&minute_change_ip=&id=${id}&change_ip=yes`;
                const res  = await fetch(url, { cache: "no-store" });
                const data = await res.json();


                // Tìm port object trong data.data để lấy status và msg
                let portMsg = "";
                let portError = false;
                if (data.data && typeof data.data === "object") {
                    const portObj = Object.values(data.data).find(v => v && typeof v === "object" && v.status);
                    if (portObj) {
                        portError = portObj.status === "error";
                        portMsg   = portObj.msg || "";
                    }
                }

                if (data.status === "success" && !portError) {
                    ok++;
                } else {
                    fail++;
                    const showMsg = portMsg || data.msg || data.message || "Lỗi đổi IP";
                    status.innerText = "⏳ " + showMsg;
                }
            }
            if (ok > 0) {
                status.innerText = "✅ Xoay thành công";
                setTimeout(fetchAndRender, 1500);
            } else {
                changeIpBtn.disabled = false;
            }
        } catch(err) {
            status.innerText = "❌ Lỗi đổi IP";
            changeIpBtn.disabled = false;
        }
    }

    const copyHttpBtn = document.createElement("button");
    copyHttpBtn.className = "btn-copy"; copyHttpBtn.style.background = "#2563eb"; copyHttpBtn.innerText = "HTTP";
    copyHttpBtn.onclick = async () => {
        const lines = box._httpLines || [];
        if (!lines.length) { alert("Chưa có proxy HTTP"); return; }
        await navigator.clipboard.writeText(lines.join("\n"));
        copyHttpBtn.innerText = "✅"; setTimeout(() => copyHttpBtn.innerText = "HTTP", 800);
    };

    const copySocksBtn = document.createElement("button");
    copySocksBtn.className = "btn-copy"; copySocksBtn.style.background = "#7c3aed"; copySocksBtn.innerText = "SOCKS5";
    copySocksBtn.onclick = async () => {
        const lines = box._socksLines || [];
        if (!lines.length) { alert("Chưa có proxy SOCKS5"); return; }
        await navigator.clipboard.writeText(lines.join("\n"));
        copySocksBtn.innerText = "✅"; setTimeout(() => copySocksBtn.innerText = "SOCKS5", 800);
    };

    // ── Lọc đầu IP ──
    async function filterIp() {
        const ipPrefix = filterInput.value.trim();
        if (!ipPrefix) { alert("Nhập đầu IP muốn lọc"); return; }
        const ids = box._proxyIds || [];
        if (!ids.length) { status.innerText = "⚠️ Chưa có proxy"; return; }
        filterBtn.disabled = true;
        status.innerText = "⏳ Đang lọc IP...";
        try {
            let ok = 0, fail = 0;
            for (const id of ids) {
                const url = `${UUID_API_BASE}${apiKey}/update?filter_ip=${encodeURIComponent(ipPrefix)}&minute_change_ip=0&id=${id}&change_ip=`;
                const res  = await fetch(url, { cache: "no-store" });
                const data = await res.json();


                let portMsg = "";
                let portError = false;
                if (data.data && typeof data.data === "object") {
                    const portObj = Object.values(data.data).find(v => v && typeof v === "object" && v.status);
                    if (portObj) { portError = portObj.status === "error"; portMsg = portObj.msg || ""; }
                }

                if (data.status === "success" && !portError) {
                    ok++;
                } else {
                    fail++;
                    const showMsg = portMsg || data.msg || data.message || "Lỗi lọc IP";
                    status.innerText = "⏳ " + showMsg;
                }
            }
            if (ok > 0) {
                status.innerText = "✅ Lọc IP thành công";
                setTimeout(fetchAndRender, 1500);
            } else {
            }
        } catch(err) {
            status.innerText = "❌ Lỗi lọc IP";
        }
        filterBtn.disabled = false;
    }

    changeIpBtn.onclick = changeAllIPs;

    // ── Filter IP input + button ──
    const filterInput = document.createElement("input");
    filterInput.type = "text";
    filterInput.placeholder = "Đầu IP (vd: 27)";
    filterInput.style.cssText = "padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #e5e7eb;width:140px;outline:none;";
    filterInput.addEventListener("keydown", e => { if (e.key === "Enter") filterIp(); });

    const filterBtn = document.createElement("button");
    filterBtn.style.background = "#0891b2";
    filterBtn.innerText = "🔍 Lọc IP";
    filterBtn.onclick = filterIp;

    const filterRow = document.createElement("div");
    filterRow.style.cssText = "display:flex;gap:6px;align-items:center;flex-wrap:wrap;";
    filterRow.append(filterInput, filterBtn);

    const actions = document.createElement("div");
    actions.className = "proxy-actions";
    actions.append(copyHttpBtn, copySocksBtn, changeIpBtn, delBtn);
    box.append(proxyArea, filterRow, actions, status);
    proxyList.appendChild(box);
    await fetchAndRender();
}

// ─── Box key thường ──────────────────────────────────────────
function createProxyBox(apiKey) {
    const info = API_MAP[apiKey];
    if (!info) return;
    const box = document.createElement("div"); box.className = "proxy-container";
    const proxyText = document.createElement("div"); proxyText.className = "proxy-text"; proxyText.innerText = info.proxy;

    const copyBtn = document.createElement("button"); copyBtn.className = "btn-copy"; copyBtn.innerText = "📋 Copy";
    copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(proxyText.innerText);
        copyBtn.innerText = "✅"; setTimeout(() => copyBtn.innerText = "📋 Copy", 800);
    };

    const rotateBtn = document.createElement("button"); rotateBtn.className = "btn-rotate"; rotateBtn.innerText = "🔄 Xoay";
    const status = document.createElement("span"); status.className = "status";

    rotateBtn.onclick = async () => {
        rotateBtn.disabled = true; status.innerText = "⏳ Đang xoay...";
        try {
            let url = info.rotate;
            if (url.includes("reset?proxy=")) url += encodeURIComponent(info.proxy);
            else url += apiKey;
            const res  = await fetch(url);
            const data = await res.json();

            if (data.success === false) {
                status.innerText = "⚠️ " + (data.message || "Không xoay được");
            } else {
                if (data.data?.proxy) { info.proxy = data.data.proxy; proxyText.innerText = data.data.proxy; }
                status.innerText = "✅ Xoay thành công";
            }
        } catch(err) {
            status.innerText = "❌ Bình tẽn xoay tutu";
        }
        rotateBtn.disabled = false;
    };

    const delBtn = document.createElement("button"); delBtn.className = "btn-delete"; delBtn.innerText = "❌";
    delBtn.onclick = () => {
        savedApis = savedApis.filter(k => k !== apiKey);
        localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));
        proxyList.removeChild(box);
    };

    const actions = document.createElement("div"); actions.className = "proxy-actions";
    actions.append(copyBtn, rotateBtn, delBtn);
    box.append(proxyText, actions, status);
    proxyList.appendChild(box);
}

// ─── Thêm API ─────────────────────────────────────────────────
addApiBtn.onclick = async () => {
    const keys = apiInput.value.trim().split(/\r?\n/).map(k => k.trim()).filter(Boolean);
    let a = 0, s = 0, i = 0;
    for (const k of keys) {
        if (savedApis.includes(k)) { s++;
 continue; }
        if (UUID_REGEX.test(k)) {
            savedApis.push(k);
            await createUuidProxyBox(k); a++;
        } else {
            if (!API_MAP[k]) { i++;
 continue; }
            savedApis.push(k); createProxyBox(k); a++;
        }
    }
    localStorage.setItem("proxy_api_keys", JSON.stringify(savedApis));
    apiStatus.innerText = `Thêm ${a} | Trùng ${s} | Sai ${i}`;
    apiInput.value = "";
};

// ─── Xoay tất cả ─────────────────────────────────────────────
rotateAllBtn.onclick = async () => {
    const buttons = document.querySelectorAll(".btn-rotate");
    for (const btn of buttons) {
        if (!btn.disabled) { btn.click(); await new Promise(r => setTimeout(r, 600)); }
    }
};

// ─── Copy tất cả ─────────────────────────────────────────────
copyAllBtn.onclick = async () => {
    const allLines = [];
    document.querySelectorAll(".proxy-text:not(.uuid-proxies)").forEach(el => { const t = el.innerText.trim(); if (t) allLines.push(t); });
    document.querySelectorAll(".proxy-container.uuid-type").forEach(b => { if (b._proxyLines) allLines.push(...b._proxyLines); });
    if (!allLines.length) { alert("Không có proxy để copy"); return; }
    await navigator.clipboard.writeText(allLines.join("\n"));
    copyAllBtn.innerText = "✅ Đã copy";
    setTimeout(() => copyAllBtn.innerText = "📋 Copy tất cả", 1200);
};

// ─── Start ────────────────────────────────────────────────────
loadApiMap();
</script>
</body>
</html>
